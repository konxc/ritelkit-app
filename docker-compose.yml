# ============================================================
# Roti Sholawat (→ ritelkit-app) - Production
# Deployment: [slug].ritelkit.konxc.space
# Hosted on: Awan Kinton (PT Koneksi Jaringan Indonesia)
# ============================================================
#
# ARSITEKTUR JARINGAN:
#   - Container ini TIDAK expose port ke host (202.162.40.162)
#   - Komunikasi hanya via Docker internal network: nginx-net
#   - nginx-proxy (port 80/443) → forward ke container ini via nginx-net
#
# Usage:
#   cp .env.docker.example .env.docker   # isi credentials
#   docker compose up -d --build

services:
  ritelkit-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: ritelkit-app:latest
    container_name: ritelkit-app
    restart: unless-stopped

    env_file:
      - .env.docker

    environment:
      - ASTRO_ADAPTER=node
      - NODE_RUNTIME=1
      # HOST 0.0.0.0 agar bisa diakses dari nginx-net (bukan hanya localhost)
      - HOST=0.0.0.0
      - PORT=4321

    volumes:
      # Persist SQLite database & uploads
      - ./data:/app/data
      - ./public/uploads:/app/public/uploads

    networks:
      - nginx-net

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4321/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # TIDAK ada `ports:` — hanya nginx-proxy yang boleh expose ke host!

networks:
  nginx-net:
    external: true
